<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sorabyte · Demos privados</title>
<meta name="robots" content="noindex, nofollow">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:'Inter',sans-serif;
  background:#0a0a0a;
  color:#fff;
  min-height:100vh;
  display:flex; align-items:center; justify-content:center;
  padding:40px 20px;
}
.box {
  max-width:520px; text-align:center;
}
h1 {
  font-size:clamp(2rem, 5vw, 3rem);
  font-weight:700; letter-spacing:-0.02em;
  margin-bottom:18px;
}
h1 em { color:#C9A254; font-style:italic; }
p {
  color:#999;
  font-size:1rem; line-height:1.6;
  margin-bottom:30px;
}
a {
  display:inline-block;
  padding:14px 28px;
  background:#C9A254;
  color:#0a0a0a;
  text-decoration:none;
  font-weight:600;
  border-radius:100px;
  transition:transform 0.2s;
}
a:hover { transform:translateY(-2px); }
</style>
</head>
<body>
<div class="box">
  <h1>Sorabyte · <em>Demos privados</em></h1>
  <p>Esta carpeta contiene demos personalizados para clientes. Si tienes el link directo de tu demo, úsalo. Si no, contáctame.</p>
  <a href="https://sorabyte.es">Volver a sorabyte.es</a>
</div>
</body>
</html>
